# CI — build the daemon + frontend, then run the web and server test suites.
#
# Action versions verified 2026-06-02 against the upstream READMEs:
#   actions/checkout@v6 · actions/setup-node@v6
#
# Test concurrency is deliberately constrained: the vitest configs cap workers
# (web maxThreads=2, server maxForks=2) and the project rule is "绝不并发跑两个
# vitest". We therefore run test:web then test:server as SEQUENTIAL steps and add
# no concurrency-raising flags. The two suites already self-pkill stale runs via
# their pretest hooks.
name: CI

on:
  push:
    branches:
      - main
      - "refactor/**"
  pull_request:
    branches:
      - main
      - "refactor/**"

# One in-flight run per ref; a newer push cancels the older run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      # ffmpeg is REQUIRED, intentionally: src/audio-tools.test.ts has REAL
      # ffmpeg/ffprobe integration tests (the "...(integration)" describe) — the
      # ONLY tests in the suite that shell out to real binaries. Without ffmpeg
      # on PATH they ENOENT and test:server can never be fully green. Everything
      # else (python-bridge, reframe, render) mocks spawn, so no python is needed.
      - name: Install ffmpeg (for audio-tools integration tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      # build = build:backend (tsc + write-dist-pkg.mjs) + build:frontend (vite).
      # build:backend's `tsc` type-checks the daemon/shared source; build:frontend
      # (vite) bundles the web app but does NOT type-check it. The web typecheck
      # gate below covers that gap.
      - name: Build
        run: npm run build

      # vite never runs tsc on web/, so web's strictest tsconfig
      # (noUnusedLocals / noUnusedParameters / noFallthroughCasesInSwitch /
      # verbatimModuleSyntax) only enforces here. Keep it after Build so a green
      # build is a precondition.
      - name: Typecheck (web)
        run: npm run typecheck:web

      # Sequential test steps — never concurrent (see header note + project rule).
      - name: Test (web)
        run: npm run test:web

      - name: Test (server)
        run: npm run test:server
