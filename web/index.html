<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoViral</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var t = localStorage.getItem("av-theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
        // R119 F559 — sync <html lang> before first paint to avoid the
        // mismatch where SR engines (NVDA/VoiceOver) latch onto the static
        // index.html "zh-CN" while the user is on EN locale. Mirrors the
        // store.ts initial-detection order (localStorage → navigator.language).
        var l = localStorage.getItem("autoviral.locale");
        if (l !== "en" && l !== "zh") {
          l = /^zh/i.test(navigator.language || "") ? "zh" : "en";
        }
        document.documentElement.setAttribute("lang", l === "zh" ? "zh-CN" : "en-US");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
