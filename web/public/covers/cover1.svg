<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450" viewBox="0 0 720 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="40%" style="stop-color:#1a1028"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>
    <linearGradient id="bar1a" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="bar1b" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f7c948;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar1c" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow1f" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="rounded1">
      <rect width="720" height="450" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded1)">
    <!-- Background -->
    <rect width="720" height="450" fill="url(#bg1)"/>

    <!-- Ambient glow blobs -->
    <ellipse cx="500" cy="350" rx="250" ry="180" fill="#ff6b35" opacity="0.06"/>
    <ellipse cx="180" cy="120" rx="200" ry="150" fill="#f7c948" opacity="0.04"/>
    <ellipse cx="600" cy="80" rx="120" ry="100" fill="#4ade80" opacity="0.04"/>

    <!-- Grid lines (subtle) -->
    <line x1="60" y1="380" x2="400" y2="380" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
    <line x1="60" y1="310" x2="400" y2="310" stroke="#fff" stroke-width="0.5" opacity="0.06"/>
    <line x1="60" y1="240" x2="400" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.04"/>
    <line x1="60" y1="170" x2="400" y2="170" stroke="#fff" stroke-width="0.5" opacity="0.03"/>

    <!-- Chart bars with rounded tops and glow -->
    <rect x="75" y="300" width="42" height="80" rx="6" fill="url(#bar1a)"/>
    <rect x="135" y="260" width="42" height="120" rx="6" fill="url(#bar1a)"/>
    <rect x="195" y="220" width="42" height="160" rx="6" fill="url(#bar1b)"/>
    <rect x="255" y="170" width="42" height="210" rx="6" fill="url(#bar1b)"/>
    <rect x="315" y="110" width="42" height="270" rx="6" fill="url(#bar1c)" filter="url(#shadow1)"/>

    <!-- Highlight glow on tallest bar -->
    <rect x="315" y="110" width="42" height="270" rx="6" fill="#4ade80" opacity="0.15" filter="url(#softglow)"/>

    <!-- Trend line -->
    <polyline points="96,290 156,248 216,208 276,158 336,100"
              fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Trend dots -->
    <circle cx="336" cy="100" r="5" fill="#4ade80" filter="url(#glow1f)"/>
    <circle cx="276" cy="158" r="3.5" fill="#f7c948" opacity="0.8"/>
    <circle cx="216" cy="208" r="3.5" fill="#f7c948" opacity="0.6"/>

    <!-- Arrow up -->
    <g transform="translate(348, 60)" filter="url(#glow1f)">
      <polygon points="12,0 0,20 8,20 8,38 16,38 16,20 24,20" fill="#4ade80"/>
    </g>

    <!-- Right side: big number -->
    <text x="480" y="185" font-family="'SF Pro Display',Arial,sans-serif" font-weight="900" font-size="110" fill="url(#glow1)" filter="url(#glow1f)" letter-spacing="-6">10x</text>

    <!-- Subtitle -->
    <text x="486" y="230" font-family="'SF Pro Display',Arial,sans-serif" font-weight="600" font-size="22" fill="#fff" opacity="0.5" letter-spacing="8">REACH</text>

    <!-- Divider line -->
    <rect x="486" y="250" width="180" height="1.5" rx="1" fill="url(#glow1)" opacity="0.3"/>

    <!-- Description text -->
    <text x="486" y="285" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="15" fill="#fff" opacity="0.45">Data-driven growth</text>
    <text x="486" y="308" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="15" fill="#fff" opacity="0.45">strategy for creators</text>

    <!-- Badge -->
    <rect x="486" y="340" width="88" height="30" rx="15" fill="#4ade80" opacity="0.15"/>
    <text x="530" y="360" font-family="'SF Pro Text',Arial,sans-serif" font-weight="700" font-size="12" fill="#4ade80" text-anchor="middle" letter-spacing="1">PROVEN</text>

    <!-- Bottom accent line -->
    <rect x="0" y="442" width="720" height="8" fill="url(#glow1)" opacity="0.6"/>
    <rect x="0" y="442" width="720" height="8" fill="url(#glow1)" opacity="0.15" filter="url(#softglow)"/>
  </g>
</svg>