<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450" viewBox="0 0 720 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c18"/>
      <stop offset="50%" style="stop-color:#151020"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="gold3v" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textshadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f59e0b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="450" fill="url(#bg3)"/>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="200" rx="280" ry="200" fill="#f59e0b" opacity="0.03"/>
  <ellipse cx="500" cy="350" rx="200" ry="150" fill="#fbbf24" opacity="0.02"/>

  <!-- Hook shape (large, elegant) -->
  <g transform="translate(60, 40)">
    <!-- Hook glow -->
    <path d="M80,60 Q80,260 200,260 Q280,260 280,200 Q280,160 250,160 Q220,160 220,190"
          fill="none" stroke="#f59e0b" stroke-width="20" opacity="0.06" filter="url(#bigglow3)"/>
    <!-- Hook main -->
    <path d="M80,60 Q80,260 200,260 Q280,260 280,200 Q280,160 250,160 Q220,160 220,190"
          fill="none" stroke="url(#gold3)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <!-- Arrow tip -->
    <polygon points="80,35 65,68 95,68" fill="#fbbf24" filter="url(#glow3)"/>
    <!-- Hook shimmer highlights -->
    <path d="M82,80 Q82,140 120,180"
          fill="none" stroke="#fff" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
  </g>

  <!-- Formula area (right side) -->
  <g transform="translate(390, 60)">
    <!-- Glass card background -->
    <rect x="0" y="0" width="280" height="330" rx="16" fill="#fff" opacity="0.03"/>
    <rect x="0" y="0" width="280" height="330" rx="16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.06"/>

    <!-- HOOK -->
    <text x="30" y="55" font-family="'SF Pro Display',Arial,sans-serif" font-weight="900" font-size="44" fill="#fbbf24" filter="url(#textshadow3)" letter-spacing="-1">HOOK</text>
    <rect x="30" y="68" width="100" height="2" rx="1" fill="#f59e0b" opacity="0.3"/>
    <text x="30" y="90" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="13" fill="#fff" opacity="0.35">First 1.5 seconds</text>

    <!-- + PACE -->
    <text x="30" y="135" font-family="'SF Pro Display',Arial,sans-serif" font-weight="300" font-size="20" fill="#f59e0b" opacity="0.5">+</text>
    <text x="55" y="135" font-family="'SF Pro Display',Arial,sans-serif" font-weight="800" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-0.5">PACE</text>
    <text x="30" y="158" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="13" fill="#fff" opacity="0.3">Cut rhythm &amp; energy</text>

    <!-- + CTA -->
    <text x="30" y="200" font-family="'SF Pro Display',Arial,sans-serif" font-weight="300" font-size="20" fill="#f59e0b" opacity="0.5">+</text>
    <text x="55" y="200" font-family="'SF Pro Display',Arial,sans-serif" font-weight="800" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-0.5">CTA</text>
    <text x="30" y="223" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="13" fill="#fff" opacity="0.3">Urgency close</text>

    <!-- Divider -->
    <rect x="30" y="245" width="220" height="1.5" rx="1" fill="url(#gold3)" opacity="0.4"/>

    <!-- = VIRAL -->
    <text x="30" y="295" font-family="'SF Pro Display',Arial,sans-serif" font-weight="300" font-size="24" fill="#4ade80" opacity="0.6">=</text>
    <text x="55" y="295" font-family="'SF Pro Display',Arial,sans-serif" font-weight="900" font-size="38" fill="#4ade80" filter="url(#glow3)" letter-spacing="-1">VIRAL</text>
  </g>

  <!-- Sparkle decorations -->
  <g fill="#fbbf24">
    <circle cx="355" cy="80" r="2" opacity="0.5"/>
    <circle cx="370" cy="120" r="1.5" opacity="0.3"/>
    <circle cx="345" cy="160" r="1" opacity="0.4"/>
    <circle cx="660" cy="60" r="2.5" opacity="0.3"/>
    <circle cx="640" cy="100" r="1.5" opacity="0.2"/>
    <circle cx="380" cy="380" r="2" opacity="0.25"/>
  </g>

  <!-- 4-point star sparkles -->
  <g transform="translate(350, 50)" fill="#fbbf24" opacity="0.5">
    <path d="M5,0 L6,4 L10,5 L6,6 L5,10 L4,6 L0,5 L4,4 Z"/>
  </g>
  <g transform="translate(670, 45)" fill="#fbbf24" opacity="0.35">
    <path d="M7,0 L8.5,5.5 L14,7 L8.5,8.5 L7,14 L5.5,8.5 L0,7 L5.5,5.5 Z"/>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="442" width="720" height="8" fill="url(#gold3)" opacity="0.5"/>
  <rect x="0" y="442" width="720" height="8" fill="#f59e0b" opacity="0.08" filter="url(#bigglow3)"/>
</svg>