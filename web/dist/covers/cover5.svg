<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450" viewBox="0 0 720 450">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1020"/>
      <stop offset="50%" style="stop-color:#0f1a30"/>
      <stop offset="100%" style="stop-color:#081018"/>
    </linearGradient>
    <linearGradient id="blue5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="green5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="450" fill="url(#bg5)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="220" rx="200" ry="180" fill="#3b82f6" opacity="0.03"/>
  <ellipse cx="550" cy="200" rx="180" ry="150" fill="#60a5fa" opacity="0.025"/>

  <!-- Clock (left side) -->
  <g transform="translate(190, 195)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="120" fill="#3b82f6" opacity="0.03" filter="url(#bigglow5)"/>

    <!-- Clock face -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
    <circle cx="0" cy="0" r="108" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>

    <!-- Hour marks -->
    <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2">
      <line x1="0" y1="-98" x2="0" y2="-88"/>
      <line x1="49" y1="-85" x2="44" y2="-76"/>
      <line x1="85" y1="-49" x2="76" y2="-44"/>
      <line x1="98" y1="0" x2="88" y2="0"/>
      <line x1="85" y1="49" x2="76" y2="44"/>
      <line x1="49" y1="85" x2="44" y2="76"/>
      <line x1="0" y1="98" x2="0" y2="88"/>
      <line x1="-49" y1="85" x2="-44" y2="76"/>
      <line x1="-85" y1="49" x2="-76" y2="44"/>
      <line x1="-98" y1="0" x2="-88" y2="0"/>
      <line x1="-85" y1="-49" x2="-76" y2="-44"/>
      <line x1="-49" y1="-85" x2="-44" y2="-76"/>
    </g>

    <!-- Minute hand (pointing to ~6) -->
    <line x1="0" y1="5" x2="0" y2="-78" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Hour hand (pointing to ~7:30) -->
    <line x1="0" y1="4" x2="-32" y2="42" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Center cap -->
    <circle cx="0" cy="0" r="6" fill="#3b82f6" filter="url(#glow5)"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.9"/>

    <!-- Golden hour arc highlight (7-8 PM zone) -->
    <path d="M-85,49 A98,98 0 0,1 -49,85" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" opacity="0.6" filter="url(#glow5)"/>
  </g>

  <!-- Right side: Weekly calendar heatmap -->
  <g transform="translate(410, 65)">
    <!-- Glass card -->
    <rect x="0" y="0" width="270" height="320" rx="14" fill="#fff" opacity="0.025"/>
    <rect x="0" y="0" width="270" height="320" rx="14" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.05"/>

    <!-- Header -->
    <text x="22" y="35" font-family="'SF Pro Display',Arial,sans-serif" font-weight="800" font-size="16" fill="#fff" opacity="0.6" letter-spacing="2">WEEKLY HEATMAP</text>
    <rect x="22" y="44" width="60" height="1.5" rx="1" fill="url(#blue5)" opacity="0.4"/>

    <!-- Day labels -->
    <text x="22" y="80" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.25">MON</text>
    <text x="22" y="115" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.25">TUE</text>
    <text x="22" y="150" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.25">WED</text>
    <text x="22" y="185" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.25">THU</text>
    <text x="22" y="220" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.25">FRI</text>
    <text x="22" y="255" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#60a5fa" opacity="0.6">SAT</text>
    <text x="22" y="290" font-family="'SF Pro Text',Arial,sans-serif" font-weight="600" font-size="11" fill="#60a5fa" opacity="0.6">SUN</text>

    <!-- Time slots header -->
    <text x="75" y="58" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="9" fill="#fff" opacity="0.2">6AM</text>
    <text x="115" y="58" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="9" fill="#fff" opacity="0.2">12PM</text>
    <text x="160" y="58" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="9" fill="#fff" opacity="0.2">6PM</text>
    <text x="205" y="58" font-family="'SF Pro Text',Arial,sans-serif" font-weight="500" font-size="9" fill="#fff" opacity="0.2">12AM</text>

    <!-- Heatmap cells (7 rows x 4 cols) -->
    <!-- Mon -->
    <rect x="72" y="68" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.08"/>
    <rect x="114" y="68" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.12"/>
    <rect x="156" y="68" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.15"/>
    <rect x="198" y="68" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.05"/>
    <!-- Tue (HOT) -->
    <rect x="72" y="103" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.1"/>
    <rect x="114" y="103" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.2"/>
    <rect x="156" y="103" width="36" height="22" rx="4" fill="#4ade80" opacity="0.6" filter="url(#glow5)"/>
    <rect x="198" y="103" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.08"/>
    <!-- Wed -->
    <rect x="72" y="138" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.06"/>
    <rect x="114" y="138" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.15"/>
    <rect x="156" y="138" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.18"/>
    <rect x="198" y="138" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.06"/>
    <!-- Thu -->
    <rect x="72" y="173" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.08"/>
    <rect x="114" y="173" width="36" height="22" rx="4" fill="#4ade80" opacity="0.35"/>
    <rect x="156" y="173" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.2"/>
    <rect x="198" y="173" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.06"/>
    <!-- Fri -->
    <rect x="72" y="208" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.1"/>
    <rect x="114" y="208" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.12"/>
    <rect x="156" y="208" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.1"/>
    <rect x="198" y="208" width="36" height="22" rx="4" fill="#3b82f6" opacity="0.04"/>
    <!-- Sat -->
    <rect x="72" y="243" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.15"/>
    <rect x="114" y="243" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.2"/>
    <rect x="156" y="243" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.25"/>
    <rect x="198" y="243" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.1"/>
    <!-- Sun -->
    <rect x="72" y="278" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.12"/>
    <rect x="114" y="278" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.18"/>
    <rect x="156" y="278" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.15"/>
    <rect x="198" y="278" width="36" height="22" rx="4" fill="#60a5fa" opacity="0.06"/>

    <!-- Best time callout on Tue 6PM -->
    <rect x="150" y="97" width="48" height="34" rx="6" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Best time label -->
  <g transform="translate(570, 148)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#4ade80" opacity="0.15"/>
    <text x="40" y="17" font-family="'SF Pro Text',Arial,sans-serif" font-weight="700" font-size="10" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">BEST TIME</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="442" width="720" height="8" fill="url(#blue5)" opacity="0.45"/>
  <rect x="0" y="442" width="720" height="8" fill="#3b82f6" opacity="0.06" filter="url(#bigglow5)"/>
</svg>