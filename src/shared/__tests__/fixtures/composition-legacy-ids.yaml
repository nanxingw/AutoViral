# Pre-Phase-D composition.yaml — track ids use the semantic
# `kind-N` shape (video-0 / audio-0 / text-0 / overlay-0) and there is no
# `displayOrder` field. `migrateLegacyTrackIds` is expected to rewrite each
# id to `trk_<uuid>` and back-fill displayOrder from the array index BEFORE
# `CompositionSchema.parse` sees the object.
#
# Clip ids, kinds, labels, language, and the clips array contents are
# expected to round-trip byte-equal through the migration.
