# Phase G (issue #34) — multi-audio mix regression fixture.
#
# Three audio lanes (BGM / VO / SFX) with deliberately overlapping clips so
# the renderer must mix N>2 sources at once. Each lane carries a per-track
# `volume` (dB; 0 = unity) so the mix-track adapter must fold the lane gain
# into each clip's linear volume before handing the result to ffmpeg.
#
# Lane gains (dB):
#   BGM = -6   (background, ducked under VO)
#   VO  =  0   (unity — drives sidechain trigger)
#   SFX = -3   (sweetener, also ducked under VO)
#
# Clip layout (8 s total):
#   BGM     |======= bgm full-length =======|   trackOffset 0, len 8
#   VO          |---- vo ----|                  trackOffset 1, len 4 (overlaps BGM)
#   SFX                  |- sfx -|              trackOffset 3, len 2 (overlaps both)
#
# Track ids use the Phase-D `trk_<uuid8>` convention (issue #31). uuids are
# deterministic in the fixture so test snapshots stay stable across runs.
