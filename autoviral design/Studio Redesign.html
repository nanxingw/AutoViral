<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>AutoViral Studio — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* PP Neue Montreal substitute stack: Inter tight-tracked. Instrument Serif for italic editorial accents. */
  :root {
    /* === Cool steel / neutral palette (dark) === */
    --accent: #a8c5d6;
    --accent-hi: #d6e4ee;
    --accent-lo: #5a7a8c;
    --accent-glow: rgba(168, 197, 214, 0.3);

    /* Dark surfaces — true neutral, no warm tint */
    --bg: #0a0b0f;
    --bg-grad: radial-gradient(1400px 900px at 85% -10%, rgba(120, 160, 200, 0.05), transparent 60%),
               radial-gradient(1000px 700px at -10% 110%, rgba(140, 110, 180, 0.04), transparent 55%),
               #0a0b0f;
    --surface-0: rgba(20, 22, 28, 0.55);
    --surface-1: rgba(26, 28, 34, 0.7);
    --surface-2: rgba(36, 38, 46, 0.78);
    --glass-border: rgba(255, 255, 255, 0.07);
    --glass-hi: rgba(255, 255, 255, 0.12);
    --divider: rgba(255, 255, 255, 0.05);

    --text: #ecedf0;
    --text-dim: #9a9ea6;
    --text-dimmer: #62656c;
    --text-muted: #42454b;

    --status-running: #7dd3fc;
    --status-done: #86efac;
    --status-pending: #6b6e76;
    --status-error: #f97066;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 22px;
  }

  [data-theme="light"] {
    /* === Refined light: paper-white + soft ink === */
    --accent: #2a3a4a;
    --accent-hi: #0f1822;
    --accent-lo: #5a6a7c;
    --accent-glow: rgba(42, 58, 74, 0.08);
    --accent-fg: #fafaf7;

    --bg: #fafaf7;
    --bg-grad: radial-gradient(1200px 900px at 80% -5%, rgba(100, 130, 160, 0.05), transparent 60%),
               radial-gradient(1000px 800px at -10% 110%, rgba(180, 170, 200, 0.04), transparent 55%),
               #fafaf7;
    --surface-0: rgba(255, 255, 255, 0.6);
    --surface-1: rgba(255, 255, 255, 0.78);
    --surface-2: rgba(246, 246, 242, 0.88);
    --glass-border: rgba(15, 24, 34, 0.08);
    --glass-hi: rgba(15, 24, 34, 0.1);
    --divider: rgba(15, 24, 34, 0.06);

    --text: #0f1822;
    --text-dim: #545c66;
    --text-dimmer: #8c929a;
    --text-muted: #b8bcc2;

    --status-running: #0369a1;
    --status-done: #15803d;
    --status-pending: #9ca3af;
    --status-error: #dc2626;
  }

  /* Cool-steel accent is default; keep explicit variant for parity */
  [data-accent="steel"] {
    --accent: #a8c5d6;
    --accent-hi: #d6e4ee;
    --accent-lo: #5a7a8c;
    --accent-glow: rgba(168, 197, 214, 0.3);
    --accent-fg: #0a0b0f;
  }
  [data-theme="light"][data-accent="steel"] {
    --accent: #2a3a4a;
    --accent-hi: #0f1822;
    --accent-lo: #5a6a7c;
    --accent-glow: rgba(42, 58, 74, 0.08);
    --accent-fg: #fafaf7;
  }

  /* Neon accent variants */
  [data-accent="violet"] {
    --accent: #c084fc;
    --accent-hi: #e4c5ff;
    --accent-lo: #7c3aed;
    --accent-glow: rgba(192, 132, 252, 0.4);
    --accent-fg: #1a1022;
  }
  [data-accent="cyan"] {
    --accent: #7dd3fc;
    --accent-hi: #bae6fd;
    --accent-lo: #0284c7;
    --accent-glow: rgba(125, 211, 252, 0.4);
    --accent-fg: #022035;
  }
  [data-accent="coral"] {
    --accent: #ff7a5c;
    --accent-hi: #ffb199;
    --accent-lo: #c2410c;
    --accent-glow: rgba(255, 122, 92, 0.4);
    --accent-fg: #2a0e05;
  }
  [data-accent="lime"] {
    --accent: #bef264;
    --accent-hi: #d9f99d;
    --accent-lo: #65a30d;
    --accent-glow: rgba(190, 242, 100, 0.4);
    --accent-fg: #1a2005;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', 'PingFang SC', system-ui, sans-serif; font-feature-settings: 'ss01', 'cv11'; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; background: var(--bg-grad); background-attachment: fixed; overflow-x: hidden; }

  /* === Typography system === */
  .font-editorial { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero', 'ss01'; }
  .tight { letter-spacing: -0.03em; }
  .tighter { letter-spacing: -0.04em; }

  /* Glass primitives */
  .glass {
    background: var(--surface-1);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
  }
  .glass-lo {
    background: var(--surface-0);
    backdrop-filter: blur(16px) saturate(130%);
    -webkit-backdrop-filter: blur(16px) saturate(130%);
    border: 1px solid var(--glass-border);
  }

  /* Ambient grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--glass-hi); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-lo); }

  /* Root app shell */
  .studio-shell {
    display: grid;
    grid-template-columns: 360px 1fr 300px;
    grid-template-rows: 56px 52px 1fr 280px;
    grid-template-areas:
      "top top top"
      "rail rail rail"
      "chat preview aside"
      "chat timeline aside";
    gap: 12px;
    padding: 12px;
    height: 100vh;
    max-height: 100vh;
  }

  .studio-shell[data-layout="v2"] {
    grid-template-columns: 300px 1fr;
    grid-template-rows: 56px 1fr 260px 44px;
    grid-template-areas:
      "top top"
      "preview preview"
      "timeline timeline"
      "dock dock";
    gap: 0;
    padding: 0;
  }

  /* Keyframes */
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .slide-up { animation: slide-up 0.4s ease; }
  .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="studio-parts.jsx"></script>
<script type="text/babel" src="studio-app.jsx"></script>
</body>
</html>
